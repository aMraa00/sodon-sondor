services:
  - type: web
    # Public URL: https://<name>.onrender.com — бодит сервертэй нэр тааруул.
    name: sodon-sondor
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 24h
      - key: REFRESH_SECRET
        sync: false
      - key: REFRESH_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: "https://sodon-sondor.vercel.app"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "Содон Сондор <noreply@sodon.mn>"
      - key: UPLOAD_MAX_SIZE
        value: 5242880
